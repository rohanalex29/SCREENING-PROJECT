<input type="text" id="dni" placeholder="Ingrese DNI" maxlength="8" oninput="validarDNI()">
<br>
<button id="btnVerificar" onclick="verificar()" disabled>Verificar</button>
<button onclick="limpiar()">Limpiar</button>
<div id="resultado"></div>

<script>
function validarDNI() {
  const dni = document.getElementById("dni").value.trim();
  const btn = document.getElementById("btnVerificar");
  // habilitar solo si tiene exactamente 8 dígitos numéricos
  if (/^\d{8}$/.test(dni)) {
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
}

function limpiar() {
  document.getElementById("dni").value = "";
  document.getElementById("resultado").innerHTML = "";
  document.getElementById("btnVerificar").disabled = true; // vuelve a deshabilitar
}
</script>

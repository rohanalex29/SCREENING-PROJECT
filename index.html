<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BUSCAR DNI</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    input { padding: 8px; font-size: 16px; }
    button { padding: 8px 12px; margin: 5px; font-size: 16px; }
    #resultado { margin-top: 20px; font-size: 18px; font-weight: bold; }
    .ok { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>BUSCAR DNI</h1>
  <input type="text" id="dni" placeholder="Ingrese DNI">
  <br>
  <button onclick="verificar()">Verificar</button>
  <button onclick="limpiar()">Limpiar</button>
  <div id="resultado"></div>

  <script>
    async function verificar() {
      const dni = document.getElementById("dni").value.trim();
      if (!dni) {
        document.getElementById("resultado").innerHTML = "<span class='error'>❌ Ingrese un DNI</span>";
        return;
      }

      try {
        // Enlace CSV publicado desde tu Google Sheets
        const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vR_yf0o4_bk8CmPKzNB4DgebCSqItCnFqI7z3anYPb2NXwCCMUuCtcotRJQr1hIaQ/pub?output=csv");
        const data = await response.text();
        const filas = data.split("\n").map(f => f.split(","));

        // Buscar fila por DNI (columna A = fila[0])
        const filaEncontrada = filas.find(fila => fila[0] === dni);

        if (!filaEncontrada) {
          document.getElementById("resultado").innerHTML = "<span class='ok'>✅ SI - Registrar participante</span>";
          return;
        }

        const nombre = filaEncontrada[8];    // Columna I = Participantes
        const hoy = filaEncontrada[11];      // Columna L = tiempo transcurrido
        const categoria = filaEncontrada[13]; // Columna N = Magrupada2

        let resultado = "";
        let leyenda = "";

        // Normalizar categoría
        const cat = categoria.toLowerCase();

        if (["focus","pretest","compra simulada","mercadito"].includes(cat)) {
          // Comparar contra 2 años
          const años = extraerAnios(hoy);
          if (años > 2) {
            resultado = "<span class='ok'>✅ SI</span>";
            leyenda = categoria + " + 2 años";
          } else {
            resultado = "<span class='error'>❌ NO</span>";
            leyenda = categoria + " - 2 años";
          }
        } else if (cat === "otros") {
          // Comparar contra 6 meses
          const meses = extraerMeses(hoy);
          if (meses > 6) {
            resultado = "<span class='ok'>✅ SI</span>";
            leyenda = "Otros + 6 meses";
          } else {
            resultado = "<span class='error'>❌ NO</span>";
            leyenda = "Otros - 6 meses";
          }
        }

        document.getElementById("resultado").innerHTML = resultado + " - " + nombre + " (" + leyenda + ")";
      } catch (error) {
        document.getElementById("resultado").innerHTML = "<span class='error'>❌ Error al leer la hoja</span>";
        console.error(error);
      }
    }

    function limpiar() {
      document.getElementById("dni").value = "";
      document.getElementById("resultado").innerHTML = "";
    }

    // Funciones auxiliares para interpretar "hoy" (ej. "11 años y 2 meses")
    function extraerAnios(texto) {
      const match = texto.match(/(\d+)\s*años/);
      return match ? parseInt(match[1]) : 0;
    }

    function extraerMeses(texto) {
      const match = texto.match(/(\d+)\s*mes/);
      return match ? parseInt(match[1]) : 0;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BUSCAR DNI</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    input { padding: 8px; font-size: 16px; }
    button { padding: 8px 12px; margin: 5px; font-size: 16px; }
    #resultado { margin-top: 20px; font-size: 18px; font-weight: bold; }
    .ok { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>BUSCAR DNI</h1>
  <input type="text" id="dni" placeholder="Ingrese DNI">
  <br>
  <button onclick="verificar()">Verificar</button>
  <button onclick="limpiar()">Limpiar</button>
  <div id="resultado"></div>

  <script>
    async function verificar() {
      const dni = document.getElementById("dni").value.trim();
      if (!dni) {
        document.getElementById("resultado").innerHTML = "<span class='error'>❌ Ingrese un DNI</span>";
        return;
      }

      try {
        const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vR_yfOo4_bk8CmPKzNB4DgebCSqltCnFqI7z3anYPb2NXwCCMUuCtcotRJQr1hlaQ/pub?output=csv");
        const data = await response.text();
        const filas = data.split("\n").map(f => f.split(","));

        // Buscar fila por DNI
        const filaEncontrada = filas.find(fila => fila[0] === dni);

        if (!filaEncontrada) {
          document.getElementById("resultado").innerHTML = "<span class='ok'>✅ SI - Registrar participante</span>";
          return;
        }

        const nombre = filaEncontrada[8];   // Columna I
        const hoy = filaEncontrada[11];     // Columna L
        const categoria = filaEncontrada[13]; // Columna N

        let resultado = "";
        let leyenda = "";

        if (["focus","pretest","compra simulada","mercadito"].includes(categoria.toLowerCase())) {
          // Comparar contra 2 años
          if (hoy.includes("años") && parseInt(hoy) > 2) {
            resultado = "<span class='ok'>✅ SI</span>";
            leyenda = categoria + " + 2 años";
          } else {
            resultado = "<span class='error'>❌ NO</span>";
            leyenda = categoria + " - 2 años";
          }
        } else if (categoria.toLowerCase() === "otros") {
          // Comparar contra 6 meses
          if (hoy.includes("meses") && parseInt(hoy) > 6) {
            resultado = "<span class='ok'>✅ SI</span>";
            leyenda = "Otros + 6 meses";
          } else {
            resultado = "<span class='error'>❌ NO</span>";
            leyenda = "Otros - 6 meses";
          }
        }

        document.getElementById("resultado").innerHTML = resultado + " - " + nombre + " (" + leyenda + ")";
      } catch (error) {
        document.getElementById("resultado").innerHTML = "<span class='error'>❌ Error al leer la hoja</span>";
        console.error(error);
      }
    }

    function limpiar() {
      document.getElementById("dni").value = "";
      document.getElementById("resultado").innerHTML = "";
    }
  </script>
</body>
</html>

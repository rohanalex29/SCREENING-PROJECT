<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BUSCAR DNI</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    input { padding: 8px; font-size: 16px; width: 200px; text-align: center; }
    button { padding: 8px 12px; margin: 5px; font-size: 16px; }
    #resultado { margin-top: 20px; font-size: 20px; font-weight: bold; }
    .ok { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>BUSCAR DNI</h1>
  <input type="text" id="dni" placeholder="Ingrese DNI" maxlength="8">
  <br>
  <button id="btnVerificar" disabled>Verificar</button>
  <button id="btnLimpiar">Limpiar</button>
  <div id="resultado"></div>

  <script>
    // 🔗 Enlace CSV (solo cambia aquí si Google genera uno nuevo)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_yf0o4_bk8CmPKzNB4DgebCSqItCnFqI7z3anYPb2NXwCCMUuCtcotRJQr1hIaQ/pub?output=csv";

    document.addEventListener("DOMContentLoaded", () => {
      const dniInput = document.getElementById("dni");
      const btnVerificar = document.getElementById("btnVerificar");
      const btnLimpiar = document.getElementById("btnLimpiar");
      const resultadoDiv = document.getElementById("resultado");

      // Validador del botón
      dniInput.addEventListener("input", () => {
        const dni = dniInput.value.trim();
        btnVerificar.disabled = !(/^\d{8}$/.test(dni));
      });

      // Acción de verificar
      btnVerificar.addEventListener("click", async () => {
        const dni = dniInput.value.trim();
        if (!dni) {
          resultadoDiv.innerHTML = "<span class='error'>❌ Ingrese un DNI</span>";
          return;
        }

        try {
          const response = await fetch(CSV_URL);
          const data = await response.text();
          const filas = data.split("\n").map(f => f.split(","));
          const filaEncontrada = filas.find(fila => fila[0] === dni);

          if (!filaEncontrada) {
            resultadoDiv.innerHTML = "<span class='ok'>✅ SI - Registrar participante</span>";
            return;
          }

          const nombre = filaEncontrada[8] || "Sin nombre";
          const hoy = filaEncontrada[11] || "";
          const categoria = filaEncontrada[13] || "";

          let resultado = "";
          let leyenda = "";
          const cat = categoria.toLowerCase();
          const totalMeses = convertirATotalMeses(hoy);

          if (["focus","pretest","compra simulada","mercadito"].includes(cat)) {
            if (totalMeses > 24) {
              resultado = "<span class='ok'>✅ SI</span>";
              leyenda = categoria + " + 2 años";
            } else {
              resultado = "<span class='error'>❌ NO</span>";
              leyenda = categoria + " - 2 años";
            }
          } else if (cat === "otros") {
            if (totalMeses > 6) {
              resultado = "<span class='ok'>✅ SI</span>";
              leyenda = "Otros + 6 meses";
            } else {
              resultado = "<span class='error'>❌ NO</span>";
              leyenda = "Otros - 6 meses";
            }
          }

          resultadoDiv.innerHTML = resultado + " - " + nombre + " (" + leyenda + ")";
        } catch (error) {
          resultadoDiv.innerHTML = "<span class='error'>❌ Error al leer la hoja</span>";
          console.error(error);
        }
      });

      // Acción de limpiar
      btnLimpiar.addEventListener("click", () => {
        dniInput.value = "";
        resultadoDiv.innerHTML = "";
        btnVerificar.disabled = true;
      });
    });

    // 📌 Convierte "X años Y meses" en total de meses
    function convertirATotalMeses(texto) {
      let años = 0, meses = 0;
      const matchAnios = texto.match(/(\d+)\s*años/);
      const matchMeses = texto.match(/(\d+)\s*mes/);
      if (matchAnios) años = parseInt(matchAnios[1]);
      if (matchMeses) meses = parseInt(matchMeses[1]);
      return (años * 12) + meses;
    }
  </script>
</body>
</html>

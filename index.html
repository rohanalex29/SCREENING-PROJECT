<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BUSCAR DNI</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    input { padding: 8px; font-size: 16px; }
    button { padding: 8px 12px; margin: 5px; font-size: 16px; }
    #resultado { margin-top: 20px; font-size: 18px; font-weight: bold; }
    .ok { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>BUSCAR DNI</h1>
  <input type="text" id="dni" placeholder="Ingrese DNI">
  <br>
  <button onclick="verificar()">Verificar</button>
  <button onclick="limpiar()">Limpiar</button>
  <div id="resultado"></div>

  <script>
    async function verificar() {
      const dni = document.getElementById("dni").value.trim();
      if (!dni) {
        document.getElementById("resultado").innerHTML = "<span class='error'>❌ Ingrese un DNI</span>";
        return;
      }

      try {
        // Enlace CSV publicado desde Google Sheets
        const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vR_yfOo4_bk8CmPKzNB4DgebCSqltCnFqI7z3anYPb2NXwCCMUuCtcotRJQr1hlaQ/pub?output=csv");
        const data = await response.text();
        const filas = data.split("\n");

        // Buscar si el DNI aparece en alguna fila
        const existe = filas.some(fila => fila.includes(dni));

        if (existe) {
          document.getElementById("resultado").innerHTML = "<span class='ok'>✅ DNI encontrado</span>";
        } else {
          document.getElementById("resultado").innerHTML = "<span class='error'>❌ DNI no encontrado</span>";
        }
      } catch (error) {
        document.getElementById("resultado").innerHTML = "<span class='error'>❌ Error al leer la hoja</span>";
        console.error(error);
      }
    }

    function limpiar() {
      document.getElementById("dni").value = "";
      document.getElementById("resultado").innerHTML = "";
    }
  </script>
</body>
</html>
